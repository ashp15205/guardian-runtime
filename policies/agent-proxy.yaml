version: "1.0"
name: "agent-proxy"

interactive_mode: warn_ask  # Best DX for developers running the proxy in a side terminal

agents:
  default:
    llm:
      provider: openai
      default_model: gpt-4o-mini
    input_guard:
      pii_detection: true
      jailbreak_detection: true
      pii_action: block
    optimizer:
      enabled: true
    cost:
      max_input_tokens: 16000
